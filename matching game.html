<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Match Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: hsl(144, 97%, 49%);
      color: #f48907;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app { width: 100%; max-width: 520px; }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    #stats { display: flex; gap: 10px; }

    .stat-card {
      background: #ffffff;
      border: 0.5px solid #d1cfc7;
      border-radius: 10px;
      padding: 8px 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 500;
    }

    #controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    #difficulty { display: flex; gap: 6px; }

    .diff-btn, #restart-btn {
      background: transparent;
      border: 0.5px solid #c0bdb6;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .diff-btn:hover, #restart-btn:hover { background: #ebebeb; }
    .diff-btn.active { background: #ebebeb; color: #1a1a1a; border-color: #999; }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.35s ease;
    }

    .card.flipped  { transform: rotateY(180deg); }
    .card.matched  { transform: rotateY(180deg); cursor: default; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: #ffffff;
      border: 0.5px solid #d1cfc7;
    }

    .card-back-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #d1cfc7;
    }

    .card-front {
      background: #ffffff;
      border: 0.5px solid #c0bdb6;
      transform: rotateY(180deg);
      font-size: 2rem;
    }

    .card.matched .card-front {
      border-color: #1D9E75;
      background: #E1F5EE;
    }

    #message {
      min-height: 28px;
      text-align: center;
      font-size: 15px;
      color: #666;
      margin: 1rem 0 0;
    }

    #win-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 2rem;
      background: #ffffff;
      border: 0.5px solid #c0bdb6;
      border-radius: 12px;
      margin-top: 1.5rem;
      text-align: center;
    }

    #win-overlay h2 { font-size: 20px; font-weight: 500; }
    #win-overlay p  { font-size: 14px; color: #666; }
  </style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="stats">
      <div class="stat-card"><div class="stat-label">Moves</div><div class="stat-val" id="moves">0</div></div>
      <div class="stat-card"><div class="stat-label">Pairs</div><div class="stat-val" id="pairs">0</div></div>
      <div class="stat-card"><div class="stat-label">Time</div><div class="stat-val" id="timer">0s</div></div>
    </div>
    <div id="controls">
      <div id="difficulty">
        <button class="diff-btn active" onclick="setDiff(4, this)">4x4</button>
        <button class="diff-btn" onclick="setDiff(6, this)">6x4</button>
      </div>
      <button id="restart-btn" onclick="init()">Restart</button>
    </div>
  </div>

  <div id="grid"></div>
  <div id="message">Flip two cards to find a match</div>

  <div id="win-overlay">
    <h2>You matched them all!</h2>
    <p id="win-stats"></p>
    <button class="diff-btn active" onclick="init()" style="margin-top:4px;">Play again</button>
  </div>
</div>

<script>
  const EMOJIS = ['🍎','🌊','🔥','🌙','🌸','⚡','🎯','🐉','🦋','🍀','🎵','🌺'];
  let cols = 4, total = 8;
  let cards = [], flipped = [], matched = 0, moves = 0, locked = false;
  let startTime = null, timerInterval = null;

  function setDiff(c, btn) {
    cols = c;
    total = c === 4 ? 8 : 12;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    init();
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function init() {
    clearInterval(timerInterval);
    moves = 0; matched = 0; flipped = []; locked = false; startTime = null;
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0';
    document.getElementById('timer').textContent = '0s';
    document.getElementById('message').textContent = 'Flip two cards to find a match';
    document.getElementById('win-overlay').style.display = 'none';

    const chosen = shuffle([...EMOJIS]).slice(0, total);
    cards = shuffle([...chosen, ...chosen].map((e, i) => ({ id: i, emoji: e, flipped: false, matched: false })));

    const grid = document.getElementById('grid');
    grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
    grid.innerHTML = '';

    cards.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.index = i;
      el.innerHTML =
        '<div class="card-face card-back"><div class="card-back-inner"></div></div>' +
        '<div class="card-face card-front">' + c.emoji + '</div>';
      el.addEventListener('click', () => flip(i, el));
      grid.appendChild(el);
    });
  }

  function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      document.getElementById('timer').textContent =
        Math.floor((Date.now() - startTime) / 1000) + 's';
    }, 1000);
  }

  function flip(i, el) {
    if (locked || cards[i].flipped || cards[i].matched) return;
    if (!startTime) startTimer();
    cards[i].flipped = true;
    el.classList.add('flipped');
    flipped.push(i);

    if (flipped.length === 2) {
      locked = true;
      moves++;
      document.getElementById('moves').textContent = moves;
      const [a, b] = flipped;
      if (cards[a].emoji === cards[b].emoji) {
        cards[a].matched = cards[b].matched = true;
        document.querySelectorAll('.card')[a].classList.add('matched');
        document.querySelectorAll('.card')[b].classList.add('matched');
        matched++;
        document.getElementById('pairs').textContent = matched;
        flipped = []; locked = false;
        document.getElementById('message').textContent =
          matched < total ? 'Nice match! Keep going.' : '';
        if (matched === total) endGame();
      } else {
        document.getElementById('message').textContent = 'Not a match — try again!';
        setTimeout(() => {
          cards[a].flipped = cards[b].flipped = false;
          document.querySelectorAll('.card')[a].classList.remove('flipped');
          document.querySelectorAll('.card')[b].classList.remove('flipped');
          flipped = []; locked = false;
          document.getElementById('message').textContent = 'Flip two cards to find a match';
        }, 900);
      }
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    const secs = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('win-stats').textContent = moves + ' moves · ' + secs + 's';
    document.getElementById('win-overlay').style.display = 'flex';
  }

  init();
</script>
</body>
</html>
